name: Placeholder CI

on:
  push:
  pull_request:

jobs:
  lint-test-contract:
    runs-on: ubuntu-latest
    env:
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      PYTHONHASHSEED: "0"
      MIGRATE_DB_PATH: .tmp/ci-migrate.sqlite3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run lint + unit tests
        run: make lint test

      - name: Show extraction benchmark report
        run: cat .tmp/extraction-benchmark-report.json

      - name: Show candidate parse benchmark report
        run: cat .tmp/candidate-parse-benchmark-report.json

      - name: Show interview relevance benchmark report
        run: cat .tmp/interview-relevance-benchmark-report.json

      - name: Show feedback quality benchmark report
        run: cat .tmp/feedback-quality-benchmark-report.json

      - name: Show trajectory quality benchmark report
        run: cat .tmp/trajectory-quality-benchmark-report.json

      - name: Show negotiation quality benchmark report
        run: cat .tmp/negotiation-quality-benchmark-report.json

      - name: Run deterministic migration targets
        run: make migrate-up migrate-down

      - name: Validate OpenAPI contract via Makefile
        run: make validate-openapi

      - name: Run contract target via Makefile
        run: make contract-test

      - name: Run dockerized validation cycle
        run: make docker-test
